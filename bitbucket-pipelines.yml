image: python:3.12-slim

definitions:
  steps:
    - step: &install-databricks-cli
        name: Install Databricks CLI
        script:
          - apt-get update -qq && apt-get install -y -qq curl unzip
          - curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          - databricks --version

pipelines:
  # Runs on every PR — lint + tests + bundle validate
  pull-requests:
    '**':
      - step:
          name: Lint & test
          script:
            - pip install --quiet pytest pandas ruff
            - ruff check .
            - python -m pytest tests/ -q
      - step:
          name: Validate bundle
          script:
            - apt-get update -qq && apt-get install -y -qq curl unzip
            - curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            - cd bundles/dashboard-metrics
            - databricks bundle validate --target dev
      - step:
          name: Deploy preview
          deployment: preview
          script:
            - apt-get update -qq && apt-get install -y -qq curl unzip
            - curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            - bash scripts/deploy_preview.sh

  branches:
    # Merge to main deploys to dev environment
    main:
      - step:
          name: Deploy to dev
          deployment: dev
          script:
            - apt-get update -qq && apt-get install -y -qq curl unzip
            - curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            - cd bundles/dashboard-metrics
            - databricks bundle deploy --target dev

  # Manual teardown of a PR preview — run from Bitbucket UI:
  # Pipelines → Run pipeline → teardown-preview → set PR_ID
  custom:
    teardown-preview:
      - variables:
          - name: PR_ID
            default: ""
            description: "PR number to tear down (e.g. 42)"
      - step:
          name: Teardown preview
          script:
            - apt-get update -qq && apt-get install -y -qq curl unzip
            - curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            - bash scripts/teardown_preview.sh "${PR_ID}"
