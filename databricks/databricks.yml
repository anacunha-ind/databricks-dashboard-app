bundle:
  name: databricks_dashboard_app

resources:
  apps:
    dashboard_metrics:
      name: ${bundle.target}_dashboard_metrics
      source_code_path: ../
      config:
        command:
          - streamlit
          - run
          - app/main.py
          - --server.port
          - "${DATABRICKS_APP_PORT:-8000}"
          - --server.address
          - "0.0.0.0"
        env:
          - name: STREAMLIT_SERVER_ENABLE_CORS
            value: "false"
          - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
            value: "false"
          - name: DATABRICKS_WAREHOUSE_ID
            valueFrom: sql-warehouse
      permissions:
        - group_name: users
          level: CAN_VIEW

targets:
  dev:
    default: true
    workspace:
      host: ${var.workspace_host}

  prod:
    workspace:
      host: ${var.workspace_host}
    resources:
      apps:
        dashboard_metrics:
          name: prod_dashboard_metrics
