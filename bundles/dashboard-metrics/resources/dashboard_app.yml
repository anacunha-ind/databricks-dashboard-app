resources:
  apps:
    dashboard_metrics_app:
      description: 'Retail Analytics Dashboard - Databricks App'
      name: ${var.app_name}
      source_code_path: '../src/app'
      # NOTE: SQL warehouse resource binding removed for sandbox compatibility.
      # Sandbox users lack CREATE SQL ENDPOINT and MANAGE permissions.
      # Warehouse connection is handled via WAREHOUSE_ID env var in app.yaml.
      # In prod (with proper permissions), uncomment the blocks below:
      #
      # resources:
      #   - name: sql-warehouse
      #     sql_warehouse:
      #       id: ${resources.sql_warehouses.dashboard_warehouse.id}
      #       permission: CAN_USE

  schemas:
    dashboard_schema:
      name: ${var.app_schema_name}
      catalog_name: ${var.app_catalog_name}
      grants:
        - principal: '${workspace.current_user.userName}'
          privileges: [ALL_PRIVILEGES]
