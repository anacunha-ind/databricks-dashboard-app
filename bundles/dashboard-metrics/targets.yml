targets:
  dev:
    default: true
    mode: development
    variables:
      app_name: ${bundle.target}-${var.base_app_name}
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  preview:
    mode: development
    variables:
      app_name: pr-${var.pr_id}-${var.base_app_name}
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/pr-${var.pr_id}

  ci:
    mode: development
    variables:
      app_name: ${bundle.target}-${var.base_app_name}
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  qa:
    mode: development
    variables:
      app_name: ${bundle.target}-${var.base_app_name}
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
      - group_name: users
        level: CAN_VIEW
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    variables:
      app_name: ${var.base_app_name}
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
      - group_name: users
        level: CAN_VIEW
