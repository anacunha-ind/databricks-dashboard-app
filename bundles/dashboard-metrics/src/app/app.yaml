# NOTE: as of the date this was written, it's not possible to parameterise the app.yaml file.
# See issue here: https://github.com/databricks/cli/issues/3679
# When this is fixed, we can parameterise the app.yaml file but for now we have to hardcode the values.
#
# SANDBOX LIMITATION: resource binding for SQL warehouse requires MANAGE permission.
# Using hardcoded warehouse ID as workaround. See: bundles/dashboard-metrics/resources/dashboard_app.yml
# for the intended resource binding approach (works in prod with proper permissions).
command: ['streamlit', 'run', 'app.py']

env:
  - name: CATALOG_NAME
    value: samples
  - name: SCHEMA_NAME
    value: tpch
  - name: LAKEBASE_HOST
    value: ep-purple-bonus-d11nbh15.database.us-west-2.cloud.databricks.com
  - name: LAKEBASE_DATABASE
    value: databricks_postgres
  - name: LAKEBASE_ENDPOINT
    value: projects/sara-lakebase-dbx-app/branches/production/endpoints/primary
